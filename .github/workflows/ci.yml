name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  backend:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Toolchain fijo (no @stable) para que clippy/fmt sean deterministas y
      # coincidan con el entorno local; se sube a mano cuando convenga.
      - uses: dtolnay/rust-toolchain@1.93.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
      - name: Instalar dependencias de Tauri (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Colocar sidecar de Typst
        run: node scripts/fetch-typst.mjs
      - name: Compilar sidecar del servidor MCP
        run: node scripts/build-mcp-sidecar.mjs
      - name: Frontend dist (requerido por generate_context)
        run: |
          npm ci
          npm run build
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: tests
        run: cargo test --workspace

  # Auditoria de seguridad de las dependencias (RUSTSEC). Falla si aparece una
  # vulnerabilidad; los warnings (unmaintained/unsound) se reportan sin bloquear.
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.0
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit

  # Gate de licencias: bloquea dependencias con copyleft fuerte (GPL/AGPL/LGPL)
  # para mantener viable una futura relicencia comercial. El copyleft debil
  # (MPL-2.0) si se permite. Ver deny.toml y CLAUDE.md.
  licenses:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.0
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - name: Licencias de crates Rust (cargo-deny)
        run: cargo deny check licenses
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Licencias de dependencias npm (produccion)
        run: |
          npm ci
          PKG="pudureport@$(node -p "require('./package.json').version")"
          npx --yes license-checker --production --excludePackages "$PKG" \
            --failOn 'GPL-1.0;GPL-2.0;GPL-2.0-only;GPL-2.0-or-later;GPL-3.0;GPL-3.0-only;GPL-3.0-or-later;AGPL-1.0;AGPL-3.0;AGPL-3.0-only;AGPL-3.0-or-later;LGPL-2.0;LGPL-2.1;LGPL-3.0;LGPL-3.0-only;SSPL-1.0;EUPL-1.1;EUPL-1.2;OSL-3.0;CDDL-1.0;CDDL-1.1'
